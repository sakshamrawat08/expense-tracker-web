<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recurring — Expense Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#020817; color:#e2e8f0; min-height:100vh; }
        nav { background:rgba(15,23,42,0.95); border-bottom:1px solid #1e293b; padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
        .nav-left { display:flex; align-items:center; gap:12px; }
        .nav-icon { width:36px; height:36px; background:linear-gradient(135deg,#6366f1,#22d3ee); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
        .nav-title { font-size:17px; font-weight:700; color:#f1f5f9; }
        .nav-links { display:flex; gap:8px; }
        .nav-link { padding:7px 14px; color:#64748b; font-size:13px; text-decoration:none; border-radius:8px; transition:all 0.2s; }
        .nav-link:hover { background:#1e293b; color:#fff; }
        .nav-link.active { background:#1e293b; color:#fff; }
        .btn-logout { padding:7px 16px; background:transparent; border:1px solid #1e293b; border-radius:8px; color:#64748b; font-size:13px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
        .btn-logout:hover { border-color:#ef4444; color:#ef4444; }
        .main { max-width:1000px; margin:0 auto; padding:32px 24px; }
        .page-header { margin-bottom:28px; }
        .page-header h1 { font-size:26px; font-weight:700; color:#f1f5f9; letter-spacing:-0.5px; }
        .page-header p { color:#64748b; font-size:14px; margin-top:4px; }
        .alert { padding:12px 16px; border-radius:10px; margin-bottom:20px; font-size:14px; display:flex; align-items:center; gap:8px; }
        .alert-success { background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2); color:#86efac; }
        .alert-error { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); color:#fca5a5; }
        .two-col { display:grid; grid-template-columns:340px 1fr; gap:20px; }
        .card { background:#0f172a; border:1px solid #1e293b; border-radius:16px; overflow:hidden; }
        .card-header { padding:18px 24px; border-bottom:1px solid #1e293b; }
        .card-title { font-size:15px; font-weight:600; color:#f1f5f9; }
        .card-body { padding:24px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:11px; font-weight:600; color:#64748b; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.6px; }
        .form-group input, .form-group select { width:100%; padding:10px 14px; background:#020817; border:1px solid #1e293b; border-radius:10px; color:#f1f5f9; font-size:14px; font-family:'Inter',sans-serif; outline:none; transition:border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color:#6366f1; }
        .form-group select option { background:#0f172a; }
        .btn-primary { background:#6366f1; color:#fff; width:100%; padding:12px; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
        .btn-primary:hover { opacity:0.88; }
        table { width:100%; border-collapse:collapse; }
        thead tr { background:#080f1e; border-bottom:1px solid #1e293b; }
        th { padding:12px 16px; text-align:left; font-size:11px; color:#475569; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; }
        td { padding:13px 16px; border-bottom:1px solid #0a1628; font-size:14px; color:#cbd5e1; vertical-align:middle; }
        tbody tr:hover td { background:rgba(99,102,241,0.05); }
        tbody tr:last-child td { border-bottom:none; }
        .badge { display:inline-flex; align-items:center; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
        .badge-daily   { background:rgba(34,211,238,0.1); color:#22d3ee; }
        .badge-weekly  { background:rgba(99,102,241,0.1); color:#818cf8; }
        .badge-monthly { background:rgba(34,197,94,0.1);  color:#4ade80; }
        .btn-delete { padding:5px 12px; background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.2); border-radius:7px; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; }
        .empty-state { text-align:center; padding:40px 20px; color:#475569; }
        @media(max-width:768px) { .two-col { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<nav>
    <div class="nav-left">
        <div class="nav-icon">💰</div>
        <div class="nav-title">Expense Tracker</div>
    </div>
    <div class="nav-links">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/budget"    class="nav-link">Budget</a>
        <a href="/recurring" class="nav-link active">Recurring</a>
    </div>
    <a th:href="@{/auth/logout}" class="btn-logout">Sign out</a>
</nav>

<div class="main">
    <div class="page-header">
        <h1>Recurring Expenses</h1>
        <p>Set up automatic expenses that repeat daily, weekly or monthly.</p>
    </div>

    <div th:if="${success}" class="alert alert-success">
        <span>✓</span><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <span>⚠</span><span th:text="${error}"></span>
    </div>

    <div class="two-col">
        <!-- ADD FORM -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">Add Recurring Expense</div>
            </div>
            <div class="card-body">
                <form method="post" th:action="@{/recurring/add}">
                    <div class="form-group">
                        <label>Amount (Rs.)</label>
                        <input type="number" name="amount"
                               step="0.01" placeholder="0.00" required/>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category">
                            <option th:each="cat : ${categories}"
                                    th:value="${cat}"
                                    th:text="${cat}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" name="description"
                               placeholder="e.g. Netflix subscription"/>
                    </div>
                    <div class="form-group">
                        <label>Frequency</label>
                        <select name="frequency">
                            <option value="DAILY">Daily</option>
                            <option value="WEEKLY">Weekly</option>
                            <option value="MONTHLY" selected>Monthly</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" name="startDate" required/>
                    </div>
                    <button type="submit" class="btn-primary">
                        Add Recurring →
                    </button>
                </form>
            </div>
        </div>

        <!-- RECURRING LIST -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">Active Recurring Expenses</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Frequency</th>
                        <th>Next Due</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(recurringList)}">
                        <td colspan="6">
                            <div class="empty-state">
                                No recurring expenses yet.<br/>
                                Add your first one!
                            </div>
                        </td>
                    </tr>
                    <tr th:each="r : ${recurringList}">
                        <td th:text="${r.description ?: '—'}"></td>
                        <td th:text="${r.category}"></td>
                        <td style="color:#22d3ee;font-weight:700"
                            th:text="'Rs.' + ${#numbers.formatDecimal(r.amount,1,2)}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="'badge-' + ${#strings.toLowerCase(r.frequency)}"
                                  th:text="${r.frequency}"></span>
                        </td>
                        <td th:text="${r.nextDueDate}"></td>
                        <td>
                            <form th:action="@{/recurring/delete/{id}(id=${r.id})}"
                                  method="post"
                                  onsubmit="return confirm('Remove this recurring expense?')">
                                <button type="submit"
                                        class="btn-delete">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
