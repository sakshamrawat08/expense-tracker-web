<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget — Expense Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#020817; color:#e2e8f0; min-height:100vh; }
        nav { background:rgba(15,23,42,0.95); border-bottom:1px solid #1e293b; padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
        .nav-left { display:flex; align-items:center; gap:12px; }
        .nav-icon { width:36px; height:36px; background:linear-gradient(135deg,#6366f1,#22d3ee); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
        .nav-title { font-size:17px; font-weight:700; color:#f1f5f9; }
        .nav-links { display:flex; gap:8px; }
        .nav-link { padding:7px 14px; color:#64748b; font-size:13px; text-decoration:none; border-radius:8px; transition:all 0.2s; }
        .nav-link:hover { background:#1e293b; color:#fff; }
        .nav-link.active { background:#1e293b; color:#fff; }
        .btn-logout { padding:7px 16px; background:transparent; border:1px solid #1e293b; border-radius:8px; color:#64748b; font-size:13px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
        .btn-logout:hover { border-color:#ef4444; color:#ef4444; }
        .main { max-width:1000px; margin:0 auto; padding:32px 24px; }
        .page-header { margin-bottom:28px; }
        .page-header h1 { font-size:26px; font-weight:700; color:#f1f5f9; letter-spacing:-0.5px; }
        .page-header p { color:#64748b; font-size:14px; margin-top:4px; }
        .alert { padding:12px 16px; border-radius:10px; margin-bottom:20px; font-size:14px; display:flex; align-items:center; gap:8px; }
        .alert-success { background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2); color:#86efac; }
        .alert-error { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); color:#fca5a5; }
        .two-col { display:grid; grid-template-columns:340px 1fr; gap:20px; }
        .card { background:#0f172a; border:1px solid #1e293b; border-radius:16px; overflow:hidden; }
        .card-header { padding:18px 24px; border-bottom:1px solid #1e293b; }
        .card-title { font-size:15px; font-weight:600; color:#f1f5f9; }
        .card-body { padding:24px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:11px; font-weight:600; color:#64748b; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.6px; }
        .form-group input, .form-group select { width:100%; padding:10px 14px; background:#020817; border:1px solid #1e293b; border-radius:10px; color:#f1f5f9; font-size:14px; font-family:'Inter',sans-serif; outline:none; transition:border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color:#6366f1; }
        .form-group select option { background:#0f172a; }
        .btn { padding:10px 18px; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:opacity 0.2s; }
        .btn-primary { background:#6366f1; color:#fff; width:100%; padding:12px; }
        .btn-primary:hover { opacity:0.88; }
        .budget-list { display:flex; flex-direction:column; gap:16px; }
        .budget-item { background:#020817; border:1px solid #1e293b; border-radius:12px; padding:18px; }
        .budget-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .budget-cat { font-size:14px; font-weight:600; color:#f1f5f9; }
        .budget-amounts { font-size:12px; color:#64748b; }
        .budget-amounts span { color:#22d3ee; font-weight:600; }
        .progress-bar { height:8px; background:#1e293b; border-radius:4px; overflow:hidden; margin-bottom:8px; }
        .progress-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
        .progress-ok       { background:linear-gradient(90deg,#22c55e,#4ade80); }
        .progress-warning  { background:linear-gradient(90deg,#f59e0b,#fbbf24); }
        .progress-exceeded { background:linear-gradient(90deg,#ef4444,#f87171); }
        .budget-footer { display:flex; justify-content:space-between; align-items:center; }
        .pct-label { font-size:12px; }
        .pct-ok       { color:#4ade80; }
        .pct-warning  { color:#fbbf24; }
        .pct-exceeded { color:#f87171; }
        .exceeded-badge { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.2); padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .btn-remove { padding:4px 10px; background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.2); border-radius:6px; font-size:11px; cursor:pointer; font-family:'Inter',sans-serif; }
        .empty-state { text-align:center; padding:40px 20px; color:#475569; }
        @media(max-width:768px) { .two-col { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<nav>
    <div class="nav-left">
        <div class="nav-icon">💰</div>
        <div class="nav-title">Expense Tracker</div>
    </div>
    <div class="nav-links">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/budget"    class="nav-link active">Budget</a>
        <a href="/recurring" class="nav-link">Recurring</a>
    </div>
    <a th:href="@{/auth/logout}" class="btn-logout">Sign out</a>
</nav>

<div class="main">
    <div class="page-header">
        <h1>Budget Manager</h1>
        <p>Set monthly spending limits per category and track your progress.</p>
    </div>

    <div th:if="${success}" class="alert alert-success">
        <span>✓</span><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <span>⚠</span><span th:text="${error}"></span>
    </div>

    <div class="two-col">
        <!-- SET BUDGET FORM -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">Set Budget Limit</div>
            </div>
            <div class="card-body">
                <form method="post" th:action="@{/budget/set}">
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category">
                            <option th:each="cat : ${categories}"
                                    th:value="${cat}"
                                    th:text="${cat}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Monthly Limit (Rs.)</label>
                        <input type="number" name="limitAmount"
                               step="0.01" placeholder="e.g. 5000" required/>
                    </div>
                    <div class="form-group">
                        <label>Month</label>
                        <input type="text" readonly
                               th:value="${currentMonth}"
                               style="color:#64748b"/>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        Set Budget →
                    </button>
                </form>
            </div>
        </div>

        <!-- BUDGET STATUS -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">This Month's Budgets</div>
            </div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(budgets)}" class="empty-state">
                    No budgets set yet.<br/>Set your first budget limit above!
                </div>
                <div class="budget-list">
                    <div th:each="b : ${budgets}" class="budget-item">
                        <div class="budget-top">
                            <div class="budget-cat"
                                 th:text="${b.category}"></div>
                            <div class="budget-amounts">
                                <span th:text="'Rs.' + ${#numbers.formatDecimal(b.spent,1,2)}"></span>
                                <span th:text="' / Rs.' + ${#numbers.formatDecimal(b.limit,1,2)}"
                                      style="color:#475569"></span>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill"
                                 th:classappend="${b.percent >= 100 ? 'progress-exceeded' : (b.percent >= 80 ? 'progress-warning' : 'progress-ok')}"
                                 th:style="'width:' + ${b.percent} + '%'"></div>
                        </div>
                        <div class="budget-footer">
                            <span class="pct-label"
                                  th:classappend="${b.percent >= 100 ? 'pct-exceeded' : (b.percent >= 80 ? 'pct-warning' : 'pct-ok')}"
                                  th:text="${#numbers.formatDecimal(b.percent,1,1) + '% used'}"></span>
                            <div style="display:flex;gap:8px;align-items:center">
                                <span th:if="${b.exceeded}"
                                      class="exceeded-badge">Over Budget!</span>
                                <form th:action="@{/budget/delete/{id}(id=${b.id})}"
                                      method="post">
                                    <button type="submit"
                                            class="btn-remove">Remove</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
