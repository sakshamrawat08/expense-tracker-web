<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #020817;
            color: #e2e8f0;
            min-height: 100vh;
        }

        nav {
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1e293b;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }

        .nav-left { display: flex; align-items: center; gap: 12px; }

        .nav-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            border-radius: 10px;
            display: flex; align-items: center;
            justify-content: center; font-size: 18px;
        }

        .nav-title {
            font-size: 17px; font-weight: 700;
            color: #f1f5f9; letter-spacing: -0.3px;
        }

        .nav-right { display: flex; align-items: center; gap: 14px; }

        .avatar {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            border-radius: 50%;
            display: flex; align-items: center;
            justify-content: center;
            font-size: 13px; font-weight: 700; color: #fff;
        }

        .username { font-size: 14px; color: #94a3b8; font-weight: 500; }

        .btn-logout {
            padding: 7px 16px;
            background: transparent;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #64748b; font-size: 13px;
            cursor: pointer; text-decoration: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

        .main { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

        .page-header { margin-bottom: 28px; }
        .page-header h1 {
            font-size: 26px; font-weight: 700;
            color: #f1f5f9; letter-spacing: -0.5px;
        }
        .page-header p {
            color: #64748b; font-size: 14px; margin-top: 4px;
        }

        .alert {
            padding: 12px 16px; border-radius: 10px;
            margin-bottom: 20px; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-success {
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
            color: #86efac;
        }
        .alert-error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px; margin-bottom: 24px;
        }

        .stat-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px; padding: 24px;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: #334155; }

        .stat-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center;
            justify-content: center; font-size: 18px;
            margin-bottom: 14px;
        }

        .stat-label {
            font-size: 12px; color: #64748b; font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        .stat-value {
            font-size: 30px; font-weight: 700;
            letter-spacing: -1px; line-height: 1;
        }

        .stat-card:nth-child(1) .stat-value { color: #22d3ee; }
        .stat-card:nth-child(2) .stat-value { color: #818cf8; }
        .stat-card:nth-child(3) .stat-value { color: #4ade80; }

        .two-col {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px; margin-bottom: 24px;
        }

        .card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            overflow: hidden;
        }

        .card-header {
            padding: 18px 24px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap; gap: 12px;
        }

        .card-title {
            font-size: 15px; font-weight: 600; color: #f1f5f9;
        }

        .card-body { padding: 24px; }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block; font-size: 11px; font-weight: 600;
            color: #64748b; margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        .form-group input,
        .form-group select {
            width: 100%; padding: 10px 14px;
            background: #020817;
            border: 1px solid #1e293b;
            border-radius: 10px;
            color: #f1f5f9; font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .form-group input::placeholder { color: #334155; }
        .form-group select option { background: #0f172a; }

        .file-input {
            width: 100%; padding: 10px 14px;
            background: #020817;
            border: 1px dashed #334155;
            border-radius: 10px;
            color: #64748b; font-size: 13px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .file-input:hover { border-color: #6366f1; color: #94a3b8; }

        .btn {
            padding: 10px 18px; border: none;
            border-radius: 10px; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif;
            text-decoration: none; display: inline-block;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:hover  { opacity: 0.88; }

        .btn-success { background: #22c55e; color: #fff; }
        .btn-primary { background: #6366f1; color: #fff; }
        .btn-warning { background: #f59e0b; color: #000; font-weight: 700; }
        .btn-muted   { background: #1e293b; color: #94a3b8; }

        .btn-row {
            display: flex; gap: 8px;
            margin-top: 8px; flex-wrap: wrap;
        }

        .charts-right {
            display: flex; flex-direction: column; gap: 16px;
        }

        .chart-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px; padding: 20px;
            flex: 1;
        }

        .chart-title {
            font-size: 11px; font-weight: 600;
            color: #64748b; margin-bottom: 16px;
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        .line-chart-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px; padding: 24px;
            margin-bottom: 24px;
        }

        .search-wrap { display: flex; gap: 8px; }

        .search-input {
            width: 260px; padding: 9px 14px;
            background: #020817;
            border: 1px solid #1e293b;
            border-radius: 10px;
            color: #f1f5f9; font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #6366f1; }
        .search-input::placeholder { color: #334155; }

        .btn-search {
            padding: 9px 16px;
            background: #1e293b; color: #94a3b8;
            border: 1px solid #334155; border-radius: 10px;
            font-size: 13px; cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .btn-search:hover { background: #334155; color: #fff; }

        table { width: 100%; border-collapse: collapse; }

        thead tr {
            background: #080f1e;
            border-bottom: 1px solid #1e293b;
        }

        th {
            padding: 12px 20px; text-align: left;
            font-size: 11px; color: #475569; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.8px;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid #0a1628;
            font-size: 14px; color: #cbd5e1;
            vertical-align: middle;
        }

        tbody tr { transition: background 0.15s; }
        tbody tr:hover td { background: rgba(99,102,241,0.05); }
        tbody tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-flex; align-items: center;
            padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }
        .badge-food          { background: rgba(34,197,94,0.1);  color: #4ade80; }
        .badge-transport     { background: rgba(59,130,246,0.1);  color: #60a5fa; }
        .badge-shopping      { background: rgba(236,72,153,0.1);  color: #f472b6; }
        .badge-health        { background: rgba(20,184,166,0.1);  color: #2dd4bf; }
        .badge-entertainment { background: rgba(168,85,247,0.1);  color: #c084fc; }
        .badge-utilities     { background: rgba(249,115,22,0.1);  color: #fb923c; }
        .badge-education     { background: rgba(34,211,238,0.1);  color: #22d3ee; }
        .badge-other         { background: rgba(100,116,139,0.1); color: #94a3b8; }

        .amount {
            font-size: 15px; font-weight: 700; color: #22d3ee;
            font-variant-numeric: tabular-nums;
        }

        .date-main { font-size: 13px; color: #e2e8f0; font-weight: 500; }
        .date-time { font-size: 11px; color: #475569; margin-top: 3px; }

        .bill-thumb {
            width: 40px; height: 40px;
            border-radius: 8px; object-fit: cover;
            cursor: pointer; border: 1px solid #1e293b;
            transition: transform 0.2s, border-color 0.2s;
        }
        .bill-thumb:hover {
            transform: scale(1.12); border-color: #6366f1;
        }

        .btn-edit {
            padding: 5px 12px;
            background: rgba(234,179,8,0.1);
            color: #fbbf24; border: 1px solid rgba(234,179,8,0.2);
            border-radius: 7px; font-size: 12px; font-weight: 600;
            cursor: pointer; text-decoration: none;
            transition: all 0.2s;
        }
        .btn-edit:hover { background: rgba(234,179,8,0.2); }

        .btn-delete {
            padding: 5px 12px;
            background: rgba(239,68,68,0.1);
            color: #f87171; border: 1px solid rgba(239,68,68,0.2);
            border-radius: 7px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-delete:hover { background: rgba(239,68,68,0.2); }

        .empty-state {
            text-align: center; padding: 60px 20px;
        }
        .empty-icon { font-size: 48px; margin-bottom: 14px; }
        .empty-text { color: #475569; font-size: 15px; line-height: 1.6; }

        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(2,8,23,0.92);
            z-index: 1000; align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }
        .modal-overlay.open { display: flex; }
        .modal-overlay img {
            max-width: 90vw; max-height: 85vh;
            border-radius: 16px; border: 1px solid #1e293b;
        }
        .modal-close {
            position: fixed; top: 20px; right: 24px;
            width: 36px; height: 36px;
            background: #1e293b; color: #fff;
            border: none; border-radius: 50%;
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .modal-close:hover { background: #ef4444; }

        @media (max-width: 1024px) {
            .two-col { grid-template-columns: 1fr; }
            .stats   { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 600px) {
            .stats { grid-template-columns: 1fr; }
            .main  { padding: 16px; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <div class="nav-left">
        <div class="nav-icon">💰</div>
        <div class="nav-title">Expense Tracker</div>
    </div>
    <div class="nav-right">
        <div style="display:flex;align-items:center;gap:8px">
            <div class="avatar"
                 th:text="${#strings.toUpperCase(#strings.substring(user.username,0,1))}">
            </div>
            <span class="username" th:text="${user.username}"></span>
        </div>
        <a th:href="@{/auth/logout}" class="btn-logout">Sign out</a>
    </div>
</nav>

<div class="main">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1>Dashboard</h1>
        <p th:text="'Welcome back, ' + ${user.username} + '. Here is your expense overview.'"></p>
    </div>

    <!-- ALERTS -->
    <div th:if="${success}" class="alert alert-success">
        <span>✓</span>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <span>⚠</span>
        <span th:text="${error}"></span>
    </div>

    <!-- STAT CARDS -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-icon"
                 style="background:rgba(34,211,238,0.1)">💳</div>
            <div class="stat-label">Total Spent</div>
            <div class="stat-value"
                 th:text="'Rs.' + ${#numbers.formatDecimal(total,1,2)}">
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"
                 style="background:rgba(99,102,241,0.1)">📋</div>
            <div class="stat-label">Total Entries</div>
            <div class="stat-value"
                 th:text="${expenses.size()}">
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"
                 style="background:rgba(34,197,94,0.1)">📅</div>
            <div class="stat-label">This Month</div>
            <div class="stat-value"
                 th:text="'Rs.' + ${#numbers.formatDecimal(monthTotal,1,2)}">
            </div>
        </div>
    </div>

    <!-- ADD FORM + MINI CHARTS -->
    <div class="two-col">

        <!-- ADD EXPENSE FORM -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Add New Expense</span>
            </div>
            <div class="card-body">
                <form method="post" th:action="@{/expenses/add}"
                      enctype="multipart/form-data">
                    <div class="form-group">
                        <label>Amount (Rs.)</label>
                        <input type="number" name="amount"
                               step="0.01" placeholder="0.00" required/>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category">
                            <option th:each="cat : ${categories}"
                                    th:value="${cat}"
                                    th:text="${cat}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" name="date"
                               th:value="${today}" required/>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" name="description"
                               placeholder="e.g. Lunch at café"/>
                    </div>
                    <div class="form-group">
                        <label>Bill Image (optional)</label>
                        <input type="file" name="billImage"
                               accept="image/*"
                               class="file-input"/>
                    </div>
                    <div class="btn-row">
                        <button type="submit"
                                class="btn btn-success">
                            + Add
                        </button>
                        <button type="button"
                                class="btn btn-primary"
                                onclick="toggleLine()">
                            Charts
                        </button>
                        <a th:href="@{/export/pdf}"
                           class="btn btn-warning">PDF</a>
                        <a th:href="@{/export/excel}"
                           class="btn btn-warning">Excel</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- MINI CHARTS -->
        <div class="charts-right">
            <div class="chart-card">
                <div class="chart-title">Spending by category</div>
                <canvas id="pieChart"
                        style="max-height:190px"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">Category comparison</div>
                <canvas id="barChart"
                        style="max-height:190px"></canvas>
            </div>
        </div>
    </div>

    <!-- LINE CHART -->
    <div class="line-chart-card" id="lineSection">
        <div class="chart-title">Monthly spending trend</div>
        <canvas id="lineChart" style="max-height:260px"></canvas>
    </div>

    <!-- EXPENSES TABLE -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">All Expenses</span>
            <form method="get" th:action="@{/dashboard}">
                <div class="search-wrap">
                    <input class="search-input" type="text"
                           name="search"
                           placeholder="Search expenses..."
                           th:value="${search}"/>
                    <button type="submit"
                            class="btn-search">Search</button>
                    <a th:if="${search != null and !#strings.isEmpty(search)}"
                       th:href="@{/dashboard}"
                       class="btn btn-muted"
                       style="padding:9px 14px;font-size:13px">
                        Clear
                    </a>
                </div>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Date &amp; Time</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Bill</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(expenses)}">
                    <td colspan="6">
                        <div class="empty-state">
                            <div class="empty-icon">💸</div>
                            <div class="empty-text">
                                No expenses yet.<br/>
                                Add your first one above!
                            </div>
                        </div>
                    </td>
                </tr>
                <tr th:each="expense : ${expenses}">
                    <td>
                        <div class="date-main"
                             th:text="${expense.date}"></div>
                        <div class="date-time"
                             th:if="${expense.expenseTime != null
                                     and !#strings.isEmpty(expense.expenseTime)}"
                             th:text="${expense.expenseTime}"></div>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${#strings.toLowerCase(expense.category)}"
                              th:text="${expense.category}">
                        </span>
                    </td>
                    <td th:text="${expense.description != null
                                  ? expense.description : '—'}">
                    </td>
                    <td>
                        <span class="amount"
                              th:text="'Rs.' + ${#numbers.formatDecimal(expense.amount,1,2)}">
                        </span>
                    </td>
                    <td>
                        <img th:if="${expense.billImageUrl != null}"
                             th:src="${expense.billImageUrl}"
                             class="bill-thumb"
                             alt="bill"
                             onclick="openImage(this.src)"/>
                        <span th:unless="${expense.billImageUrl != null}"
                              style="color:#334155">—</span>
                    </td>
                    <td>
                        <div style="display:flex;gap:8px;align-items:center">
                            <a th:href="@{/expenses/edit/{id}(id=${expense.id})}"
                               class="btn-edit">Edit</a>
                            <form th:action="@{/expenses/delete/{id}(id=${expense.id})}"
                                  method="post"
                                  onsubmit="return confirm('Delete this expense?')">
                                <button type="submit"
                                        class="btn-delete">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- BILL IMAGE MODAL -->
<div class="modal-overlay" id="imgModal" onclick="closeImage()">
    <button class="modal-close" onclick="closeImage()">✕</button>
    <img id="modalImg" src="" alt="Bill"/>
</div>

<script>
async function loadCharts() {
    try {
        const res  = await fetch('/api/chart-data');
        const data = await res.json();

        const catLabels = Object.keys(data.categoryData   || {});
        const catValues = Object.values(data.categoryData || {});
        const monLabels = Object.keys(data.monthlyData    || {});
        const monValues = Object.values(data.monthlyData  || {});

        const COLORS = [
            '#22d3ee','#6366f1','#f59e0b','#22c55e',
            '#ec4899','#f97316','#a78bfa','#34d399'
        ];

        const tip = {
            backgroundColor: '#0f172a',
            borderColor: '#334155',
            borderWidth: 1,
            titleColor: '#f1f5f9',
            bodyColor: '#94a3b8',
            padding: 12,
            cornerRadius: 8
        };

        // ── DOUGHNUT PIE ─────────────────────────────────────
        if (catLabels.length > 0) {
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: catLabels,
                    datasets: [{
                        data: catValues,
                        backgroundColor: COLORS,
                        borderColor: '#020817',
                        borderWidth: 3,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '62%',
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#64748b',
                                font: { size: 11 },
                                boxWidth: 10,
                                padding: 10
                            }
                        },
                        tooltip: {
                            ...tip,
                            callbacks: {
                                label: ctx => {
                                    const v = ctx.parsed;
                                    const t = ctx.dataset.data
                                        .reduce((a,b) => a+b, 0);
                                    const p = ((v/t)*100).toFixed(1);
                                    return ` Rs.${v.toFixed(2)} (${p}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // ── BAR ──────────────────────────────────────────────
        if (catLabels.length > 0) {
            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: catLabels,
                    datasets: [{
                        data: catValues,
                        backgroundColor: COLORS.map(c => c + '2a'),
                        borderColor: COLORS,
                        borderWidth: 2,
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            ...tip,
                            callbacks: {
                                label: ctx =>
                                    ` Rs.${ctx.parsed.y.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#475569',
                                font: { size: 11 }
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.03)'
                            }
                        },
                        y: {
                            ticks: {
                                color: '#475569',
                                font: { size: 11 },
                                callback: v => 'Rs.' + v
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.05)'
                            }
                        }
                    }
                }
            });
        }

        // ── LINE ─────────────────────────────────────────────
        if (monLabels.length > 0) {
            new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: {
                    labels: monLabels,
                    datasets: [{
                        label: 'Monthly Spending',
                        data: monValues,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99,102,241,0.07)',
                        borderWidth: 2.5,
                        pointBackgroundColor: '#6366f1',
                        pointBorderColor: '#020817',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 9,
                        pointHoverBackgroundColor: '#22d3ee',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index', intersect: false
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            ...tip,
                            callbacks: {
                                title: ctx =>
                                    'Month: ' + ctx[0].label,
                                label: ctx =>
                                    ` Rs.${ctx.parsed.y.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#475569' },
                            grid: {
                                color: 'rgba(255,255,255,0.03)'
                            }
                        },
                        y: {
                            ticks: {
                                color: '#475569',
                                callback: v => 'Rs.' + v
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.05)'
                            }
                        }
                    }
                }
            });
        }

    } catch (err) {
        console.error('Chart error:', err);
    }
}

function toggleLine() {
    const s = document.getElementById('lineSection');
    s.style.display =
        s.style.display === 'none' ? 'block' : 'none';
}

function openImage(src) {
    document.getElementById('modalImg').src = src;
    document.getElementById('imgModal').classList.add('open');
}

function closeImage() {
    document.getElementById('imgModal').classList.remove('open');
}

loadCharts();
</script>
</body>
</html>
