<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Expense Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #020817;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%; max-width: 480px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 20px;
            padding: 44px;
        }

        .top {
            display: flex; align-items: center;
            gap: 12px; margin-bottom: 32px;
        }

        .brand-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            border-radius: 12px;
            display: flex; align-items: center;
            justify-content: center; font-size: 20px;
        }

        .brand-name { font-size: 18px; font-weight: 700; color: #fff; }

        h2 {
            font-size: 26px; font-weight: 700;
            color: #f1f5f9; margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; }

        .alert {
            padding: 12px 16px; border-radius: 10px;
            margin-bottom: 20px; font-size: 13px;
        }
        .alert-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block; font-size: 13px;
            font-weight: 500; color: #94a3b8;
            margin-bottom: 7px;
        }

        .form-group input {
            width: 100%; padding: 12px 14px;
            background: #020817;
            border: 1px solid #1e293b;
            border-radius: 10px;
            color: #f1f5f9; font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .form-group input::placeholder { color: #334155; }

        .password-hint {
            font-size: 12px; color: #475569;
            margin-top: 6px;
        }

        .btn-primary {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff; border: none;
            border-radius: 10px; font-size: 15px;
            font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
            margin-top: 4px;
        }
        .btn-primary:hover { opacity: 0.9; }

        .login-link {
            text-align: center; margin-top: 22px;
            font-size: 14px; color: #64748b;
        }
        .login-link a {
            color: #6366f1; text-decoration: none; font-weight: 500;
        }
        .login-link a:hover { color: #818cf8; }
    </style>
</head>
<body>
<div class="card">
    <div class="top">
        <div class="brand-icon">💰</div>
        <div class="brand-name">Expense Tracker</div>
    </div>

    <h2>Create account</h2>
    <p class="subtitle">Start tracking your expenses for free</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form method="post" th:action="@{/auth/register}">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username"
                   placeholder="Choose a username" required autofocus/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email"
                   placeholder="your@email.com" required/>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password"
                       placeholder="Min 6 chars" required/>
            </div>
            <div class="form-group">
                <label>Confirm</label>
                <input type="password" name="confirmPassword"
                       placeholder="Repeat" required/>
            </div>
        </div>
        <button type="submit" class="btn-primary">
            Create Account →
        </button>
    </form>

    <div class="login-link">
        Already have an account?
        <a th:href="@{/auth/login}">Sign in →</a>
    </div>
</div>
</body>
</html>
